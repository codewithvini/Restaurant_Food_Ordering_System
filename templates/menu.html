{% extends "base.html" %}

{% block title %}Menu Management - Restaurant System{% endblock %}

{% block content %}
<div class="container my-5">
    <h1 class="mb-4"><i class="bi bi-card-list"></i> Menu Management</h1>

    <!-- Add New Item Button -->
    <div class="mb-3">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addMenuModal">
            <i class="bi bi-plus-circle"></i> Add New Item
        </button>
        <div class="float-end">
            <input type="text" id="searchInput" class="form-control" placeholder="Search menu..." style="width: 300px;">
        </div>
    </div>

    <!-- Menu Items Table -->
    <div class="card shadow">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover" id="menuTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Description</th>
                            <th>Available</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="menuTableBody">
                        <!-- Will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Menu Modal -->
<div class="modal fade" id="addMenuModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Menu Item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="menuForm">
                    <input type="hidden" id="itemId">
                    <div class="mb-3">
                        <label class="form-label">Item Name *</label>
                        <input type="text" class="form-control" id="itemName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category *</label>
                        <select class="form-select" id="itemCategory" required>
                            <option value="">Select Category</option>
                            <option value="Appetizer">Appetizer</option>
                            <option value="Main Course">Main Course</option>
                            <option value="Dessert">Dessert</option>
                            <option value="Beverage">Beverage</option>
                            <option value="Side Dish">Side Dish</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price (₹) *</label>
                        <input type="number" class="form-control" id="itemPrice" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="itemDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="itemAvailability" checked>
                        <label class="form-check-label">Available</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveMenuItem()">Save</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
let currentEditId = null;

// Load menu items on page load
$(document).ready(function() {
    loadMenuItems();
});

// Load all menu items
function loadMenuItems() {
    $.ajax({
        url: '/api/menu',
        method: 'GET',
        success: function(response) {
            if (response.success) {
                displayMenuItems(response.data);
            }
        },
        error: function() {
            alert('Error loading menu items');
        }
    });
}

// Display menu items in table
function displayMenuItems(items) {
    const tbody = $('#menuTableBody');
    tbody.empty();

    items.forEach(item => {
        const availableBadge = item.availability
            ? '<span class="badge bg-success">Yes</span>'
            : '<span class="badge bg-danger">No</span>';

        const row = `
            <tr>
                <td><strong>${item.name}</strong></td>
                <td><span class="badge bg-secondary">${item.category}</span></td>
                <td>₹${parseFloat(item.price).toFixed(2)}</td>
                <td>${item.description || '-'}</td>
                <td>${availableBadge}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editMenuItem('${item._id}')">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="deleteMenuItem('${item._id}')">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `;
        tbody.append(row);
    });
}

// Save menu item (Add or Update)
function saveMenuItem() {
    const id = $('#itemId').val();
    const data = {
        name: $('#itemName').val(),
        category: $('#itemCategory').val(),
        price: parseFloat($('#itemPrice').val()),
        description: $('#itemDescription').val(),
        availability: $('#itemAvailability').is(':checked')
    };

    const url = id ? `/api/menu/${id}` : '/api/menu';
    const method = id ? 'PUT' : 'POST';

    $.ajax({
        url: url,
        method: method,
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(response) {
            if (response.success) {
                alert(response.message);
                $('#addMenuModal').modal('hide');
                $('#menuForm')[0].reset();
                $('#itemId').val('');
                loadMenuItems();
            } else {
                alert(response.message);
            }
        },
        error: function() {
            alert('Error saving menu item');
        }
    });
}

// Edit menu item
function editMenuItem(id) {
    $.ajax({
        url: '/api/menu',
        method: 'GET',
        success: function(response) {
            if (response.success) {
                const item = response.data.find(i => i._id === id);
                if (item) {
                    $('#itemId').val(item._id);
                    $('#itemName').val(item.name);
                    $('#itemCategory').val(item.category);
                    $('#itemPrice').val(item.price);
                    $('#itemDescription').val(item.description);
                    $('#itemAvailability').prop('checked', item.availability);
                    $('#modalTitle').text('Edit Menu Item');
                    $('#addMenuModal').modal('show');
                }
            }
        }
    });
}

// Delete menu item
function deleteMenuItem(id) {
    if (confirm('Are you sure you want to delete this item?')) {
        $.ajax({
            url: `/api/menu/${id}`,
            method: 'DELETE',
            success: function(response) {
                if (response.success) {
                    alert(response.message);
                    loadMenuItems();
                } else {
                    alert(response.message);
                }
            },
            error: function() {
                alert('Error deleting menu item');
            }
        });
    }
}

// Search functionality
$('#searchInput').on('keyup', function() {
    const searchTerm = $(this).val();
    if (searchTerm.length > 0) {
        $.ajax({
            url: `/api/menu/search?q=${searchTerm}`,
            method: 'GET',
            success: function(response) {
                if (response.success) {
                    displayMenuItems(response.data);
                }
            }
        });
    } else {
        loadMenuItems();
    }
});

// Reset modal when opening for new item
$('#addMenuModal').on('hidden.bs.modal', function() {
    $('#menuForm')[0].reset();
    $('#itemId').val('');
    $('#modalTitle').text('Add Menu Item');
});
</script>
{% endblock %}
