{% extends "base.html" %}

{% block title %}Order Tracking - Restaurant System{% endblock %}

{% block content %}
<div class="container my-5">
    <h1 class="mb-4"><i class="bi bi-cart"></i> Order Tracking</h1>

    <!-- Create Order Button -->
    <div class="mb-3">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createOrderModal">
            <i class="bi bi-plus-circle"></i> Create New Order
        </button>
        <div class="float-end">
            <input type="text" id="searchOrderInput" class="form-control" placeholder="Search orders..." style="width: 300px;">
        </div>
    </div>

    <!-- Orders Table -->
    <div class="card shadow">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Customer</th>
                            <th>Phone</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Create Order Modal -->
<div class="modal fade" id="createOrderModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create New Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="orderForm">
                    <div class="mb-3">
                        <label class="form-label">Customer Name *</label>
                        <input type="text" class="form-control" id="customerName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone *</label>
                        <input type="text" class="form-control" id="customerPhone" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Order Items (one per line) *</label>
                        <textarea class="form-control" id="orderItems" rows="4" placeholder="Pizza&#10;Cold Coffee&#10;Fries" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Total Amount (₹) *</label>
                        <input type="number" class="form-control" id="totalAmount" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Payment Method *</label>
                        <select class="form-select" id="paymentMethod" required>
                            <option value="">Select Method</option>
                            <option value="Cash">Cash</option>
                            <option value="Card">Card</option>
                            <option value="UPI">UPI</option>
                            <option value="Online">Online</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" onclick="createOrder()">Create Order</button>
            </div>
        </div>
    </div>
</div>

<!-- Update Status Modal -->
<div class="modal fade" id="updateStatusModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Order Status</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="updateOrderId">
                <div class="mb-3">
                    <label class="form-label">New Status</label>
                    <select class="form-select" id="newStatus">
                        <option value="Pending">Pending</option>
                        <option value="Preparing">Preparing</option>
                        <option value="Ready">Ready</option>
                        <option value="Delivered">Delivered</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateOrderStatus()">Update</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    loadOrders();
});

function loadOrders() {
    $.ajax({
        url: '/api/orders',
        method: 'GET',
        success: function(response) {
            if (response.success) {
                displayOrders(response.data);
            }
        }
    });
}

function displayOrders(orders) {
    const tbody = $('#ordersTableBody');
    tbody.empty();

    orders.forEach(order => {
        const statusBadge = getStatusBadge(order.status);
        const date = new Date(order.order_date).toLocaleString();
        const itemsList = Array.isArray(order.items) ? order.items.join(', ') : order.items;

        const row = `
            <tr>
                <td><strong>${order.customer_name}</strong></td>
                <td>${order.phone}</td>
                <td><small>${itemsList}</small></td>
                <td><strong>₹${parseFloat(order.total_amount).toFixed(2)}</strong></td>
                <td><span class="badge bg-info">${order.payment_method}</span></td>
                <td>${statusBadge}</td>
                <td><small>${date}</small></td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="showUpdateStatus('${order._id}', '${order.status}')">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="deleteOrder('${order._id}')">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `;
        tbody.append(row);
    });
}

function getStatusBadge(status) {
    const badges = {
        'Pending': '<span class="badge bg-warning">Pending</span>',
        'Preparing': '<span class="badge bg-info">Preparing</span>',
        'Ready': '<span class="badge bg-primary">Ready</span>',
        'Delivered': '<span class="badge bg-success">Delivered</span>',
        'Cancelled': '<span class="badge bg-danger">Cancelled</span>'
    };
    return badges[status] || '<span class="badge bg-secondary">' + status + '</span>';
}

function createOrder() {
    const items = $('#orderItems').val().split('\n').filter(i => i.trim());
    const data = {
        customer_name: $('#customerName').val(),
        phone: $('#customerPhone').val(),
        items: items,
        total_amount: parseFloat($('#totalAmount').val()),
        payment_method: $('#paymentMethod').val()
    };

    $.ajax({
        url: '/api/orders',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(response) {
            if (response.success) {
                alert(response.message);
                $('#createOrderModal').modal('hide');
                $('#orderForm')[0].reset();
                loadOrders();
            } else {
                alert(response.message);
            }
        }
    });
}

function showUpdateStatus(orderId, currentStatus) {
    $('#updateOrderId').val(orderId);
    $('#newStatus').val(currentStatus);
    $('#updateStatusModal').modal('show');
}

function updateOrderStatus() {
    const orderId = $('#updateOrderId').val();
    const status = $('#newStatus').val();

    $.ajax({
        url: `/api/orders/${orderId}/status`,
        method: 'PUT',
        contentType: 'application/json',
        data: JSON.stringify({ status: status }),
        success: function(response) {
            if (response.success) {
                alert(response.message);
                $('#updateStatusModal').modal('hide');
                loadOrders();
            } else {
                alert(response.message);
            }
        }
    });
}

function deleteOrder(orderId) {
    if (confirm('Are you sure you want to delete this order?')) {
        $.ajax({
            url: `/api/orders/${orderId}`,
            method: 'DELETE',
            success: function(response) {
                if (response.success) {
                    alert(response.message);
                    loadOrders();
                } else {
                    alert(response.message);
                }
            }
        });
    }
}

$('#searchOrderInput').on('keyup', function() {
    const searchTerm = $(this).val();
    if (searchTerm.length > 0) {
        $.ajax({
            url: `/api/orders/search?q=${searchTerm}`,
            method: 'GET',
            success: function(response) {
                if (response.success) {
                    displayOrders(response.data);
                }
            }
        });
    } else {
        loadOrders();
    }
});
</script>
{% endblock %}
